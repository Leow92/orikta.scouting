name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Run tests
        run: pytest
        env:
          # Provide empty keys so modules load without raising on missing env vars.
          # No live API calls are made in the test suite — all I/O is mocked.
          API_FOOTBALL_KEY: ""
          MISTRAL_API_KEY: ""
          GROQ_API_KEY: ""
